---
- hosts: web
  become: yes

  tasks:

    - name: Install Docker
      apt:
        name: docker.io
        state: present
        update_cache: no

    - name: start Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Pull nginx image
      community.docker.docker_image:
        name: nginx
        tag: latest
        source: pull

    - name: Run nginx container
      docker_container:
        name: volcanix-nginx
        image: nginx
        state: started
        ports:
          - "8080:80"
